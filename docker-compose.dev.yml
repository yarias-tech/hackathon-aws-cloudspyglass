services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    working_dir: /workspace/backend
    volumes:
      - ./backend:/workspace/backend
      - ./data:/workspace/data
      - ./assets:/workspace/assets
    environment:
      - PYTHONUNBUFFERED=1
