name: Infra — Terraform Plan & Apply

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: infra

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform Init
        run: terraform init -no-color

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -no-color

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -var-file="terraform.tfvars" -out=tfplan -no-color -detailed-exitcode
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check Plan Result
        run: |
          EXIT_CODE="${{ steps.plan.outputs.exit_code }}"
          if [ "$EXIT_CODE" = "1" ]; then
            echo "Terraform plan failed with errors."
            exit 1
          fi
          echo "Plan exit code: $EXIT_CODE (0=no changes, 2=changes pending)"

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
